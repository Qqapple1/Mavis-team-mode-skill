name: Validate Skill

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Full validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node (for some helpers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ============ Shell script checks ============

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: shellcheck install.sh
        run: shellcheck scripts/install.sh

      - name: shellcheck validate.sh
        run: shellcheck scripts/validate.sh

      - name: bash syntax check (every .sh)
        run: |
          for f in $(find . -name "*.sh" -not -path "./.git/*"); do
            echo "Checking $f..."
            bash -n "$f" || { echo "SYNTAX ERROR in $f"; exit 1; }
          done

      # ============ Python checks ============

      - name: python syntax check (every .py)
        run: |
          for f in $(find . -name "*.py" -not -path "./.git/*"); do
            echo "Checking $f..."
            python3 -m py_compile "$f" || { echo "SYNTAX ERROR in $f"; exit 1; }
          done

      - name: YAML frontmatter validation
        run: python3 scripts/validate_yaml.py

      # ============ Skill install + verify ============

      - name: Install skill to test location
        run: |
          MAVIS_TEAM_REPO="file://$GITHUB_WORKSPACE" bash scripts/install.sh --no-verify

      - name: Run validation script
        run: bash scripts/validate.sh

      # ============ E2E prototype test ============

      - name: Start prototype server
        run: |
          cd examples/prototype-todo-app
          nohup python3 server/server.py > /tmp/server.log 2>&1 &
          sleep 2

      - name: Run e2e tests
        run: python3 examples/prototype-todo-app/test_e2e.py

      - name: Stop prototype server
        if: always()
        run: pkill -f "python3 server/server.py" || true

      # ============ Idempotency check ============

      - name: Re-run install (idempotency)
        run: MAVIS_TEAM_REPO="file://$GITHUB_WORKSPACE" bash scripts/install.sh --no-verify

      - name: Re-run validate after reinstall
        run: bash scripts/validate.sh

      # ============ Summary ============

      - name: Summary
        if: always()
        run: |
          echo "::notice::Skill validation complete"
