name: Validate Skill

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ Static checks (fast, all OS in matrix) ============
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: shellcheck install.sh
        run: shellcheck scripts/install.sh

      - name: shellcheck validate.sh
        run: shellcheck scripts/validate.sh

      - name: bash syntax check
        run: |
          set -e
          for f in $(find . -name "*.sh" -not -path "./.git/*"); do
            echo "Checking $f..."
            bash -n "$f"
          done

  # ============ Python multi-version ============
  python-lint:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: python syntax check
        run: |
          set -e
          for f in $(find . -name "*.py" -not -path "./.git/*"); do
            echo "Checking $f on Python ${{ matrix.python-version }}..."
            python -m py_compile "$f"
          done

      - name: YAML validation
        run: python scripts/validate_yaml.py

  # ============ Full integration test (Linux only — most thorough) ============
  integration:
    name: Integration test (Linux)
    runs-on: ubuntu-latest
    needs: [lint, python-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: shellcheck (full)
        run: |
          shellcheck scripts/install.sh
          shellcheck scripts/validate.sh

      - name: bash syntax
        run: |
          for f in $(find . -name "*.sh" -not -path "./.git/*"); do
            bash -n "$f"
          done

      - name: python syntax
        run: |
          for f in $(find . -name "*.py" -not -path "./.git/*"); do
            python3 -m py_compile "$f"
          done

      - name: YAML frontmatter
        run: python3 scripts/validate_yaml.py

      - name: Install (first time)
        run: MAVIS_TEAM_REPO="file://$GITHUB_WORKSPACE" bash scripts/install.sh --no-verify

      - name: Validate after install
        run: bash scripts/validate.sh

      - name: Start prototype server
        run: |
          cd examples/prototype-todo-app
          nohup python3 server/server.py > /tmp/server.log 2>&1 &
          sleep 2
          # Verify it started
          curl -fsS http://127.0.0.1:8765/api/health || { cat /tmp/server.log; exit 1; }

      - name: Run base e2e tests
        run: python3 examples/prototype-todo-app/test_e2e.py

      - name: Run extended e2e tests
        run: python3 examples/prototype-todo-app/test_e2e_extended.py

      - name: Token benchmark
        run: |
          python3 scripts/benchmark_tokens.py
          python3 scripts/benchmark_tokens.py --json > token-benchmark.json

      - name: Stop prototype server
        if: always()
        run: pkill -f "python3 server/server.py" || true

      - name: Idempotency re-install
        run: MAVIS_TEAM_REPO="file://$GITHUB_WORKSPACE" bash scripts/install.sh --no-verify

      - name: Idempotency re-validate
        run: bash scripts/validate.sh

      - name: Idempotency 3rd install
        run: MAVIS_TEAM_REPO="file://$GITHUB_WORKSPACE" bash scripts/install.sh --no-verify

      - name: Idempotency 3rd validate
        run: bash scripts/validate.sh

      - name: Summary
        if: always()
        run: |
          echo "::notice::Full integration test complete"

  # ============ Stats / coverage report ============
  stats:
    name: Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: File count
        run: |
          echo "### File counts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for ext in md py sh html yml yaml; do
            count=$(find . -name "*.$ext" -not -path "./.git/*" | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "- .$ext: $count" >> $GITHUB_STEP_SUMMARY
            fi
          done
          total=$(find . -type f -not -path "./.git/*" | wc -l)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total**: $total files" >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY
