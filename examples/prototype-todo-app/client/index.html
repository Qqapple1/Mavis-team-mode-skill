<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo with Tag Filter — Mavis Team Mode Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 20px;
    min-height: 100vh;
  }
  h1 { margin-bottom: 8px; font-size: 24px; }
  .meta { color: #86868b; font-size: 13px; margin-bottom: 20px; }
  .layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
  @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }
  .sidebar, .main {
    background: white;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .tag {
    display: block;
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .tag:hover { background: #f0f0f5; }
  .tag.active { background: #0071e3; color: white; font-weight: 500; }
  .tag.all { font-weight: 500; border-bottom: 1px solid #e5e5ea; margin-bottom: 8px; }
  .add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e5e5ea;
  }
  .add-form input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #d2d2d7;
    border-radius: 6px;
    font-size: 14px;
  }
  .add-form input:focus { outline: none; border-color: #0071e3; }
  .add-form input.invalid { border-color: #ff3b30; }
  .add-form button {
    padding: 8px 16px;
    background: #0071e3;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .add-form button:hover { background: #0077ed; }
  .add-form button:disabled { background: #c7c7cc; cursor: not-allowed; }
  .add-form .field { flex: 1; display: flex; flex-direction: column; }
  .add-form .field-hint { font-size: 11px; color: #ff3b30; margin-top: 4px; min-height: 14px; }
  .todo {
    padding: 12px;
    border-bottom: 1px solid #e5e5ea;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .todo:last-child { border-bottom: none; }
  .todo.done .title { text-decoration: line-through; color: #86868b; }
  .todo .tag-badge {
    background: #e5e5ea;
    color: #1d1d1f;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .todo .delete {
    margin-left: auto;
    background: transparent;
    border: 1px solid #d2d2d7;
    color: #86868b;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .todo .delete:hover { color: #ff3b30; border-color: #ff3b30; }
  .todo input[type="checkbox"] { cursor: pointer; }
  .empty { text-align: center; color: #86868b; padding: 40px; }
  .status {
    display: inline-block;
    background: #34c759;
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .status.error { background: #ff3b30; }
  .status.loading { background: #ff9500; }
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1d1d1f;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #ff3b30; }
  .toast.success { background: #34c759; }
</style>
</head>
<body>
<h1>📋 Todo with Tag Filter</h1>
<p class="meta">
  Mavis Team Mode prototype ·
  <span id="status" class="status loading">connecting…</span>
</p>

<div class="layout">
  <div class="sidebar">
    <div class="tag all active" data-tag="">All</div>
    <div id="tags"></div>
  </div>
  <div class="main">
    <form class="add-form" id="add-form" novalidate>
      <div class="field">
        <input type="text" id="new-title" placeholder="Task title..." maxlength="200" required>
        <div class="field-hint" id="title-hint"></div>
      </div>
      <div class="field">
        <input type="text" id="new-tag" placeholder="tag-name" maxlength="50" pattern="^[a-z0-9][a-z0-9-]*$" required>
        <div class="field-hint" id="tag-hint"></div>
      </div>
      <button type="submit" id="submit-btn">Add</button>
    </form>
    <div id="todos"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://127.0.0.1:8765/api";
let allTodos = [];
let activeTag = "";

const statusEl = document.getElementById("status");
const tagsEl = document.getElementById("tags");
const todosEl = document.getElementById("todos");
const addForm = document.getElementById("add-form");
const newTitle = document.getElementById("new-title");
const newTag = document.getElementById("new-tag");
const submitBtn = document.getElementById("submit-btn");
const titleHint = document.getElementById("title-hint");
const tagHint = document.getElementById("tag-hint");
const toast = document.getElementById("toast");

const TAG_RE = /^[a-z0-9][a-z0-9-]{0,49}$/;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status " + (cls || "");
}

let toastTimer = null;
function showToast(msg, type) {
  toast.textContent = msg;
  toast.className = "toast show " + (type || "");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.className = "toast";
  }, 3000);
}

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  let data;
  try { data = await res.json(); } catch { data = {}; }
  return { status: res.status, data, ok: res.ok };
}

function renderTags(tags) {
  tagsEl.innerHTML = tags
    .map(t => `<div class="tag" data-tag="${escapeHtml(t)}">#${escapeHtml(t)}</div>`)
    .join("");
  document.querySelectorAll(".tag").forEach(el => {
    el.addEventListener("click", () => {
      activeTag = el.dataset.tag;
      document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      renderTodos();
    });
  });
}

function renderTodos() {
  const list = activeTag
    ? allTodos.filter(t => t.tag === activeTag)
    : allTodos;
  if (list.length === 0) {
    todosEl.innerHTML = `<div class="empty">No todos with this tag</div>`;
    return;
  }
  todosEl.innerHTML = list
    .map(t => `
      <div class="todo ${t.done ? "done" : ""}" data-id="${t.id}">
        <input type="checkbox" ${t.done ? "checked" : ""} data-action="toggle">
        <span class="tag-badge">#${escapeHtml(t.tag)}</span>
        <span class="title">${escapeHtml(t.title)}</span>
        <button class="delete" data-action="delete">Delete</button>
      </div>
    `).join("");
  // Attach handlers
  todosEl.querySelectorAll("[data-action='toggle']").forEach(el => {
    el.addEventListener("change", async (e) => {
      const id = e.target.closest(".todo").dataset.id;
      const r = await api("PATCH", `/todos/${id}`, { done: e.target.checked });
      if (!r.ok) {
        showToast("Failed to update: " + (r.data.error || r.status), "error");
        e.target.checked = !e.target.checked;  // revert
      } else {
        const todo = allTodos.find(t => t.id == id);
        if (todo) todo.done = e.target.checked;
        renderTodos();
      }
    });
  });
  todosEl.querySelectorAll("[data-action='delete']").forEach(el => {
    el.addEventListener("click", async (e) => {
      const id = e.target.closest(".todo").dataset.id;
      if (!confirm("Delete this todo?")) return;
      const r = await api("DELETE", `/todos/${id}`);
      if (!r.ok) {
        showToast("Failed to delete: " + (r.data.error || r.status), "error");
        return;
      }
      allTodos = allTodos.filter(t => t.id != id);
      renderTodos();
      showToast("Deleted", "success");
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function validateTitle() {
  const v = newTitle.value.trim();
  if (!v) { titleHint.textContent = "Title required"; newTitle.classList.add("invalid"); return false; }
  if (v.length > 200) { titleHint.textContent = "Max 200 chars"; newTitle.classList.add("invalid"); return false; }
  titleHint.textContent = ""; newTitle.classList.remove("invalid"); return true;
}

function validateTag() {
  const v = newTag.value.trim();
  if (!v) { tagHint.textContent = "Tag required"; newTag.classList.add("invalid"); return false; }
  if (!TAG_RE.test(v)) { tagHint.textContent = "Lowercase, digits, hyphens (1-50)"; newTag.classList.add("invalid"); return false; }
  tagHint.textContent = ""; newTag.classList.remove("invalid"); return true;
}

newTitle.addEventListener("input", validateTitle);
newTag.addEventListener("input", validateTag);

addForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  // Run both validators unconditionally so users see ALL errors at once
  // (not just the first failure). Returns early if either fails.
  const titleOk = validateTitle();
  const tagOk = validateTag();
  if (!titleOk || !tagOk) return;
  submitBtn.disabled = true;
  const r = await api("POST", "/todos", { title: newTitle.value.trim(), tag: newTag.value.trim() });
  submitBtn.disabled = false;
  if (!r.ok) {
    showToast("Failed: " + (r.data.error || r.status), "error");
    return;
  }
  newTitle.value = ""; newTag.value = "";
  titleHint.textContent = ""; tagHint.textContent = "";
  allTodos.push(r.data);
  // Refresh tags list
  const tr = await api("GET", "/tags");
  renderTags(tr.data);
  renderTodos();
  showToast("Added!", "success");
});

async function init() {
  try {
    const [todosRes, tagsRes] = await Promise.all([api("GET", "/todos"), api("GET", "/tags")]);
    if (!todosRes.ok || !tagsRes.ok) throw new Error("API not OK");
    allTodos = todosRes.data;
    renderTags(tagsRes.data);
    renderTodos();
    setStatus("connected", "");
  } catch (e) {
    setStatus("error: " + e.message, "error");
    todosEl.innerHTML = `<div class="empty">
      Cannot reach backend. Did you start the server?<br><br>
      <code>python server/server.py</code>
    </div>`;
  }
}

init();
</script>
</body>
</html>
