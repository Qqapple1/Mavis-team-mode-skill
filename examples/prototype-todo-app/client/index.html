<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo with Tag Filter — Mavis Team Mode Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 20px;
  }
  h1 { margin-bottom: 8px; font-size: 24px; }
  .meta { color: #86868b; font-size: 13px; margin-bottom: 20px; }
  .layout { display: grid; grid-template-columns: 200px 1fr; gap: 20px; }
  .sidebar {
    background: white;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .main {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .tag {
    display: block;
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .tag:hover { background: #f0f0f5; }
  .tag.active { background: #0071e3; color: white; font-weight: 500; }
  .tag.all { font-weight: 500; border-bottom: 1px solid #e5e5ea; margin-bottom: 8px; }
  .todo {
    padding: 12px;
    border-bottom: 1px solid #e5e5ea;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .todo:last-child { border-bottom: none; }
  .todo.done .title { text-decoration: line-through; color: #86868b; }
  .todo .tag-badge {
    background: #e5e5ea;
    color: #1d1d1f;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .empty { text-align: center; color: #86868b; padding: 40px; }
  .status {
    display: inline-block;
    background: #34c759;
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .status.error { background: #ff3b30; }
  .status.loading { background: #ff9500; }
</style>
</head>
<body>
<h1>📋 Todo with Tag Filter</h1>
<p class="meta">
  Mavis Team Mode prototype ·
  <span id="status" class="status loading">connecting…</span>
</p>

<div class="layout">
  <div class="sidebar">
    <div class="tag all active" data-tag="">All</div>
    <div id="tags"></div>
  </div>
  <div class="main">
    <div id="todos"></div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8765/api";
let allTodos = [];
let activeTag = "";

const statusEl = document.getElementById("status");
const tagsEl = document.getElementById("tags");
const todosEl = document.getElementById("todos");

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status " + (cls || "");
}

async function fetchJson(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error(path + " -> " + res.status);
  return res.json();
}

function renderTags(tags) {
  tagsEl.innerHTML = tags
    .map(t => `<div class="tag" data-tag="${t}">#${t}</div>`)
    .join("");
  document.querySelectorAll(".tag").forEach(el => {
    el.addEventListener("click", () => {
      activeTag = el.dataset.tag;
      document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      renderTodos();
    });
  });
}

function renderTodos() {
  const list = activeTag
    ? allTodos.filter(t => t.tag === activeTag)
    : allTodos;
  if (list.length === 0) {
    todosEl.innerHTML = `<div class="empty">No todos with this tag</div>`;
    return;
  }
  todosEl.innerHTML = list
    .map(t => `
      <div class="todo ${t.done ? "done" : ""}">
        <span class="tag-badge">#${t.tag}</span>
        <span class="title">${escapeHtml(t.title)}</span>
      </div>
    `).join("");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

async function init() {
  try {
    const [todos, tags] = await Promise.all([
      fetchJson("/todos"),
      fetchJson("/tags"),
    ]);
    allTodos = todos;
    renderTags(tags);
    renderTodos();
    setStatus("connected", "");
  } catch (e) {
    setStatus("error: " + e.message, "error");
    todosEl.innerHTML = `<div class="empty">
      Cannot reach backend. Did you start the server?<br><br>
      <code>python server/server.py</code>
    </div>`;
  }
}

init();
</script>
</body>
</html>
